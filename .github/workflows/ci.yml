name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/engine -> target

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Build inaricode-engine (debug)
        run: cargo build --manifest-path packages/engine/Cargo.toml

      - name: Vitest (CLI)
        env:
          # Skip napi-rs native build in CI; exercise JSON-line subprocess IPC.
          INARI_ENGINE_IPC: subprocess
        run: yarn workspace @inaricode/cli test

      - name: Cargo test (engine)
        run: cargo test --manifest-path packages/engine/Cargo.toml
