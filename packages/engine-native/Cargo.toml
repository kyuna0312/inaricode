[package]
name = "inari-code-engine-napi"
version = "0.1.0"
edition = "2021"
description = "N-API bindings for InariCode engine (in-process IPC)"

[lib]
crate-type = ["cdylib"]

[dependencies]
inaricode-engine = { path = "../engine" }
napi = { version = "2", default-features = false, features = ["napi4"] }
napi-derive = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
