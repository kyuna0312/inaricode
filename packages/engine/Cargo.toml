[package]
name = "inaricode-engine"
version = "0.1.0"
edition = "2021"
description = "Native engine for InariCode: sandboxed fs, grep, patch, subprocess"

[lib]
name = "inaricode_engine"
path = "src/lib.rs"

[[bin]]
name = "inaricode-engine"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
ignore = "0.4"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
similar = "2"
diffy = "0.4"
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
tempfile = "3"
