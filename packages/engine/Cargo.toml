[package]
name = "inaricode-engine"
version = "0.1.0"
edition = "2021"
description = "Native engine for InariCode: sandboxed fs, grep, patch, subprocess"

[lib]
name = "inaricode_engine"
path = "src/lib.rs"

[[bin]]
name = "inaricode-engine"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
ignore = "0.4"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
similar = "2"
diffy = "0.4"
# Only what ipc + process_ops need (smaller binary than `full`)
tokio = { version = "1", features = ["io-util", "macros", "process", "rt-multi-thread", "time"] }

[profile.release]
lto = "thin"
strip = true
codegen-units = 1
opt-level = 3
panic = "abort"

[dev-dependencies]
tempfile = "3"
